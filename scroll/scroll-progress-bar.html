<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scroll progress bar</title>
    <style>
        .sec1{
            width: 100%;
            height: 1768px;
        }
        .sec2{
            width: 100%;
            height: 1200px;
        }
        @keyframes progress-bar{
            from{
                transform: scaleX(0);
            }
            to{
                transform: scaleX(1);
            }
        }
        #progress{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: green;

            transform-origin: left;
            animation: progress-bar linear forwards;
            animation-timeline: scroll();
        }
    </style>
</head>
<body>
    <div id="progress"></div>
    <div class="sec1"></div>
    <div class="sec2"></div>
</body>
</html>
