<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syne:wght@400..800&display=swap">
    
</head>
<body>
    <main>

         <!-- ====================Start CSS Transition===============  -->
        <section class="section">
            <h2 class="section-title">CSS Transitions</h2>

            <div class="demo-grid cols2">
                <div class="card">
                    <div class="card-title">transform + background + border-radius</div>
                        <div class="hover-box center-content hide-text-on-hover"><span class="hover-text">Hover Me</span></div>
                </div>

                <div class="card">
                    <div class="card-title">button glow + lift</div>
                    <button class="btn-demo center-content"><span class="hover-text">Hover Me</span></button>
                </div>

                <div class="card">
                    <div class="card-title">width transform</div>
                    <div class="width-transform center-content hide-text-on-hover"><span class="hover-text">Hover Me</span></div>
                </div>

                <div class="card">
                    <div class="card-title">star transform</div>
                    <div class="shape-star center-content hide-text-on-hover"><span class="hover-text">Hover Me</span></div>
                </div>

            </div>

        

        </section>

         <!-- ====================Start CSS Transition===============  -->

         <!-- ====================Start @keyframes===============  -->
        <section class="section">
            <h2 class="section-title">@keyframes</h2>

            <div class="demo-grid cols3">
                <div class="card">
                    <div class="card-title">Spin</div>
                    <div class="spin-box"></div>
                </div>

                <div class="card">
                    <div class="card-title">Pulse</div>
                    <div class="pulse-dot"></div>
                </div>

                <div class="card">
                    <div class="card-title">Bounce</div>
                    <div class="bounce-box"></div>
                </div>

                <div class="card">
                    <div class="card-title">Fade In</div>
                    <div class="fade-box"></div>
                </div>
                
            </div>
        </section>
         <!-- ====================End @keyframes===============  -->


          <!-- ====================Start @keyframes===============  -->
        <section class="section">
            <h2 class="section-title">Timing Functions</h2>
            <div class="card">
                <div class="timing-row">
                    <div class="timing-item">
                        <span class="timing-label">ease</span>
                        <div class="timing-track"><div class="timing-ball ease"></div></div>
                    </div>
                    <div class="timing-item">
                        <span class="timing-label">ease-in</span>
                        <div class="timing-track"><div class="timing-ball ease-in"></div></div>
                    </div>
                    <div class="timing-item">
                        <span class="timing-label">ease-out</span>
                        <div class="timing-track"><div class="timing-ball ease-out"></div></div>
                    </div>
                    <div class="timing-item">
                        <span class="timing-label">ease-in-out</span>
                        <div class="timing-track"><div class="timing-ball ease-in-out"></div></div>
                    </div>
                    <div class="timing-item">
                        <span class="timing-label">linear</span>
                        <div class="timing-track"><div class="timing-ball linear"></div></div>
                    </div>
                    <div class="timing-item">
                        <span class="timing-label">steps</span>
                        <div class="timing-track"><div class="timing-ball steps-ball"></div></div>
                    </div>
                    <div class="timing-item">
                        <span class="timing-label">cubic-bezier</span>
                        <div class="timing-track"><div class="timing-ball cubic-ball"></div></div>
                    </div>
                    
                </div>
            </div>
            
        </section>
         <!-- ====================End @keyframes===============  -->


           <!-- ====================Start CSS Delay===============  -->
        <section class="section">
            <h2 class="section-title">CSS Delay</h2>
            <div class="card">
                <div class="delay-rows">
                    <div class="delay-row delay-track">
                    <div class="delay-circle"></div>
                    <div class="delay-circle"></div>
                    <div class="delay-circle"></div>
                    <div class="delay-circle"></div>
                    <div class="delay-circle"></div>
                    <div class="delay-circle"></div>
                    <div class="delay-circle"></div>
                </div>
                <div class="delay-row2 delay-track">
                    <div class="delay-circle2"></div>
                    <div class="delay-circle2"></div>
                    <div class="delay-circle2"></div>
                    <div class="delay-circle2"></div>
                    <div class="delay-circle2"></div>
                    <div class="delay-circle2"></div>
                    <div class="delay-circle2"></div>
                </div>
                </div>

            </div>
                
            
            
        </section>
         <!-- ====================End CSS Delay===============  -->

         
    </main>
</body>
</html>
